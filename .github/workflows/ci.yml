name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test (microservices)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore services/UnifiedRewards.Services.sln

      - name: Build
        run: dotnet build services/UnifiedRewards.Services.sln --no-restore -c Release

      - name: Test
        run: dotnet test services/UnifiedRewards.Services.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"

  build-frontend:
    name: Build (frontend portals)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build all portals
        working-directory: frontend
        run: npm run build

      - name: Upload portal bundles
        uses: actions/upload-artifact@v4
        with:
          name: portal-bundles
          path: |
            frontend/shell/dist
            frontend/portals/*/dist

  build-docker-images:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        service:
          - { name: employee-profile,      dockerfile: services/employee-profile/Dockerfile }
          - { name: benefits-catalogue,    dockerfile: services/benefits-catalogue/Dockerfile }
          - { name: compensation-rules,    dockerfile: services/compensation-rules/Dockerfile }
          - { name: reimbursement-workflow,dockerfile: services/reimbursement-workflow/Dockerfile }
          - { name: document-processing,   dockerfile: services/document-processing/Dockerfile }
          - { name: payroll-integration,   dockerfile: services/payroll-integration/Dockerfile }
          - { name: reporting-compliance,  dockerfile: services/reporting-compliance/Dockerfile }
          - { name: gateway,               dockerfile: services/gateway/Dockerfile }

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service.name }} image
        run: |
          docker build \
            -f ${{ matrix.service.dockerfile }} \
            -t urp/${{ matrix.service.name }}:ci \
            .
