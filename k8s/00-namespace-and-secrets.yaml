# Namespace + secrets for the Unified Rewards Platform on AKS.
# Apply this FIRST. Replace the secret placeholder values (see deploy steps doc) before applying,
# or create the secret imperatively from the deployed Service Bus / Storage connection strings.
apiVersion: v1
kind: Namespace
metadata:
  name: urp
---
# Connection strings the backend services read at runtime.
# DO NOT commit real values. Create this from the Bicep outputs instead, e.g.:
#   kubectl -n urp create secret generic urp-secrets \
#     --from-literal=ServiceBusConnection="<service-bus-conn-string>" \
#     --from-literal=BlobConnection="<storage-conn-string>"
apiVersion: v1
kind: Secret
metadata:
  name: urp-secrets
  namespace: urp
type: Opaque
stringData:
  ServiceBusConnection: "REPLACE_WITH_SERVICE_BUS_CONNECTION_STRING"
  BlobConnection: "REPLACE_WITH_STORAGE_CONNECTION_STRING"
