# Backend services (7) for AKS. Images come from your ACR — replace `urpprodacr.azurecr.io`
# if your registry differs (the pipeline also pins the exact tag with `kubectl set image`).
#
# NOTE on replicas: these services use SQLite on an emptyDir (same as the Container Apps demo),
# so each replica has its OWN database. They run at replicas: 1 until you migrate to Azure SQL
# (see the code-change checklist). After that, raise replicas / add an HPA (HLD target 2–10).
# ─────────────────────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata: { name: urp-employee-profile, namespace: urp }
spec:
  replicas: 1
  selector: { matchLabels: { app: urp-employee-profile } }
  template:
    metadata: { labels: { app: urp-employee-profile } }
    spec:
      containers:
        - name: app
          image: urpprodacr.azurecr.io/employee-profile:latest
          ports: [{ containerPort: 80 }]
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:80" }
            - { name: ASPNETCORE_ENVIRONMENT, value: "Azure" }
            - { name: DB_DIR, value: "/app/data" }
            - { name: Messaging__Provider, value: "ServiceBus" }
            - { name: Messaging__ServiceBus__Topic, value: "urp-events" }
            - name: Messaging__ServiceBus__ConnectionString
              valueFrom: { secretKeyRef: { name: urp-secrets, key: ServiceBusConnection } }
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 10, periodSeconds: 30 }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: urp-employee-profile, namespace: urp }
spec:
  selector: { app: urp-employee-profile }
  ports: [{ port: 80, targetPort: 80 }]
