apiVersion: apps/v1
kind: Deployment
metadata: { name: urp-reporting-compliance, namespace: urp }
spec:
  replicas: 1
  selector: { matchLabels: { app: urp-reporting-compliance } }
  template:
    metadata: { labels: { app: urp-reporting-compliance } }
    spec:
      containers:
        - name: app
          image: urpprodacr.azurecr.io/reporting-compliance:latest
          ports: [{ containerPort: 80 }]
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:80" }
            - { name: ASPNETCORE_ENVIRONMENT, value: "Azure" }
            - { name: DB_DIR, value: "/app/data" }
            - { name: Messaging__Provider, value: "ServiceBus" }
            - { name: Messaging__ServiceBus__Topic, value: "urp-events" }
            - { name: Messaging__ServiceBus__Subscription, value: "reporting-compliance" }
            # In-cluster service DNS (plain http between pods — no TLS/301 issue):
            - { name: Services__Reimbursement, value: "http://urp-reimbursement-workflow" }
            - { name: Services__Payroll, value: "http://urp-payroll-integration" }
            - name: Messaging__ServiceBus__ConnectionString
              valueFrom: { secretKeyRef: { name: urp-secrets, key: ServiceBusConnection } }
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 10, periodSeconds: 30 }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: urp-reporting-compliance, namespace: urp }
spec:
  selector: { app: urp-reporting-compliance }
  ports: [{ port: 80, targetPort: 80 }]
