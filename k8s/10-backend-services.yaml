---
apiVersion: apps/v1
kind: Deployment
metadata: { name: urp-document-processing, namespace: urp }
spec:
  replicas: 1
  selector: { matchLabels: { app: urp-document-processing } }
  template:
    metadata: { labels: { app: urp-document-processing } }
    spec:
      containers:
        - name: app
          image: urpprodacr.azurecr.io/document-processing:latest
          ports: [{ containerPort: 80 }]
          env:
            - { name: ASPNETCORE_URLS, value: "http://+:80" }
            - { name: ASPNETCORE_ENVIRONMENT, value: "Azure" }
            - { name: DB_DIR, value: "/app/data" }
            - { name: Messaging__Provider, value: "ServiceBus" }
            - { name: Messaging__ServiceBus__Topic, value: "urp-events" }
            - { name: Storage__Provider, value: "AzureBlob" }
            - { name: Storage__AzureBlob__Container, value: "receipts" }
            - name: Messaging__ServiceBus__ConnectionString
              valueFrom: { secretKeyRef: { name: urp-secrets, key: ServiceBusConnection } }
            - name: Storage__AzureBlob__ConnectionString
              valueFrom: { secretKeyRef: { name: urp-secrets, key: BlobConnection } }
          volumeMounts: [{ name: data, mountPath: /app/data }]
          readinessProbe: { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 5, periodSeconds: 10 }
          livenessProbe:  { httpGet: { path: /health, port: 80 }, initialDelaySeconds: 10, periodSeconds: 30 }
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: urp-document-processing, namespace: urp }
spec:
  selector: { app: urp-document-processing }
  ports: [{ port: 80, targetPort: 80 }]
