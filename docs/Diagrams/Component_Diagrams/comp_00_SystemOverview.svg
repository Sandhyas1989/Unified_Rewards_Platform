<!-- FOOTNOTE -->
<text x="20" y="506" font-size="7.5" fill="#5F5E5A">Aligned to canonical 7-module taxonomy: (1) User Management (2) Benefits (3) Compensation (4) Claims &amp; Documents (5) Payroll (6) Promotions (7) Reporting &amp; Audit.</text>
<text x="20" y="518" font-size="7.5" fill="#5F5E5A">Each module = one AKS microservice with its own controller. Payroll exposes GET payslips on-demand (sync) while the monthly settlement run executes asynchronously via Background Jobs / Azure Functions.</text>

