<text x="173" y="88" text-anchor="middle" font-size="8" font-weight="600" fill="#042C53">Claims &amp; Documents Service</text>
<text x="173" y="101" text-anchor="middle" font-size="7" fill="#0C447C">Blob upload trigger · claim lifecycle events</text>
<rect x="324" y="72" width="282" height="38" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="465" y="88" text-anchor="middle" font-size="8" font-weight="600" fill="#042C53">Payroll Service</text>
<text x="465" y="101" text-anchor="middle" font-size="7" fill="#0C447C">payroll processed / payslip ready</text>
<rect x="616" y="72" width="282" height="38" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="757" y="88" text-anchor="middle" font-size="8" font-weight="600" fill="#042C53">Benefits Service</text>
<text x="757" y="101" text-anchor="middle" font-size="7" fill="#0C447C">enrollment events</text>
<rect x="908" y="72" width="272" height="38" rx="4" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="1044" y="88" text-anchor="middle" font-size="8" font-weight="600" fill="#042C53">Compensation Service</text>
<text x="1044" y="101" text-anchor="middle" font-size="7" fill="#0C447C">CTC revision events</text>
<line x1="300" y1="116" x2="300" y2="134" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text x="308" y="129" font-size="6.5" fill="#888780">claim topics</text>
<line x1="980" y1="116" x2="980" y2="134" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text x="988" y="129" font-size="6.5" fill="#888780">emit AuditEvent</text>

<!-- AZURE SERVICE BUS -->
<rect x="20" y="134" width="900" height="78" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
<text x="32" y="149" font-size="9" font-weight="700" fill="#4A1B0C">AZURE SERVICE BUS — Topic-based Pub/Sub · Message TTL 7 days</text>
<rect x="32"  y="156" width="170" height="32" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
<text x="117" y="169" text-anchor="middle" font-size="7.5" font-weight="600" fill="#4A1B0C">claims/submitted</text>
<text x="117" y="181" text-anchor="middle" font-size="6.5" fill="#71270F">{claimId | employeeId | amount}</text>
<rect x="208" y="156" width="170" height="32" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
<text x="293" y="169" text-anchor="middle" font-size="7.5" font-weight="600" fill="#4A1B0C">claims/approved</text>
<text x="293" y="181" text-anchor="middle" font-size="6.5" fill="#71270F">{claimId | settledAmount}</text>
<rect x="384" y="156" width="170" height="32" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
<text x="469" y="169" text-anchor="middle" font-size="7.5" font-weight="600" fill="#4A1B0C">claims/rejected</text>
<text x="469" y="181" text-anchor="middle" font-size="6.5" fill="#71270F">{claimId | reason}</text>
<rect x="560" y="156" width="170" height="32" rx="4" fill="#F5C4B3" stroke="#D85A30" stroke-width="0.5"/>
<text x="645" y="169" text-anchor="middle" font-size="7.5" font-weight="600" fill="#4A1B0C">claims/settled</text>
<text x="645" y="181" text-anchor="middle" font-size="6.5" fill="#71270F">{employeeId | payrollId | netPay}</text>
<rect x="736" y="156" width="172" height="32" rx="4" fill="#F6A98E" stroke="#D85A30" stroke-width="0.5"/>
<text x="822" y="169" text-anchor="middle" font-size="7.5" font-weight="600" fill="#4A1B0C">Dead Letter Queue</text>
<text x="822" y="181" text-anchor="middle" font-size="6.5" fill="#71270F">max 3 failed attempts</text>
<text x="32" y="203" font-size="7" fill="#71270F">Subscribers receive events by topic subscription; failed deliveries route to the DLQ after 3 attempts.</text>

<!-- AZURE EVENT HUB -->
<rect x="932" y="134" width="248" height="78" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text x="944" y="149" font-size="9" font-weight="700" fill="#412402">AZURE EVENT HUB</text>
<text x="944" y="161" font-size="7.5" fill="#633806">Append-only Audit Stream · 30-day retention</text>
<rect x="944" y="166" width="224" height="38" rx="4" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text x="1056" y="180" text-anchor="middle" font-size="7.5" font-weight="600" fill="#412402">AuditEvents partition</text>
<text x="1056" y="192" text-anchor="middle" font-size="6.5" fill="#633806">{entityType | entityRef | action |</text>
<text x="1056" y="201" text-anchor="middle" font-size="6.5" fill="#633806">performedBy | timestamp | IP}</text>

<line x1="300" y1="212" x2="300" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>
<text x="308" y="229" font-size="6.5" fill="#888780">trigger settlement / notify</text>

<!-- EVENT SUBSCRIBERS -->
<rect x="20" y="240" width="900" height="84" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="32" y="255" font-size="9" font-weight="700" fill="#0C447C">EVENT SUBSCRIBERS</text>
