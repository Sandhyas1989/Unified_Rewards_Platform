<svg width="1460" height="928" viewBox="0 0 1460 928" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <text x="730" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a18">Sequence 01 — Claim Submission &amp; Approval Workflow</text>
  <text x="730" y="38" text-anchor="middle" font-size="10" fill="#5F5E5A">ASP.NET Core 8 · Reimbursement Workflow &amp; Document Processing services · Claims state machine · OCR stub (Tesseract in prod) · EF Core 8 · SQLite</text>

  <!-- Header boxes -->
  <!-- 0 Employee actor xc=80 -->
  <rect x="10" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="80" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Employee</text>
  <text x="80" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">submits claim</text>

  <!-- 1 Manager actor xc=235 -->
  <rect x="165" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="235" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Manager</text>
  <text x="235" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">approves</text>

  <!-- 2 Claims Portal frontend xc=390 -->
  <rect x="320" y="48" width="140" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="390" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#085041">Claims Portal</text>
  <text x="390" y="76" text-anchor="middle" font-size="7" fill="#085041">React MF</text>

  <!-- 3 API Gateway gateway xc=545 -->
  <rect x="475" y="48" width="140" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="545" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#3C3489">API Gateway</text>
  <text x="545" y="76" text-anchor="middle" font-size="7" fill="#3C3489">YARP Gateway</text>

  <!-- 4 Claims Controller controller xc=700 -->
  <rect x="630" y="48" width="140" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="700" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Claims Controller</text>
  <text x="700" y="76" text-anchor="middle" font-size="7" fill="#0C447C">ASP.NET Core 8</text>

  <!-- 5 MediatR Handler handler xc=855 -->
  <rect x="785" y="48" width="140" height="38" rx="6" fill="#DCE9F8" stroke="#185FA5"/>
  <text x="855" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Service Handler</text>
  <text x="855" y="76" text-anchor="middle" font-size="7" fill="#0C447C">controller</text>

  <!-- 6 ClaimWorkflow + OCR domain xc=1010 -->
  <rect x="940" y="48" width="140" height="38" rx="6" fill="#ECE3F6" stroke="#6B4FA8"/>
  <text x="1010" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A2E7A">ClaimWorkflow + OCR</text>
  <text x="1010" y="76" text-anchor="middle" font-size="7" fill="#4A2E7A">state machine · Tesseract</text>

  <!-- 7 EF Core 8 data xc=1165 -->
  <rect x="1095" y="48" width="140" height="38" rx="6" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="1165" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#412402">EF Core 8</text>
  <text x="1165" y="76" text-anchor="middle" font-size="7" fill="#412402">SQLite · local file store</text>

  <!-- 8 Service Bus / Email platform xc=1320 -->
  <rect x="1250" y="48" width="140" height="38" rx="6" fill="#FAECE7" stroke="#993C1D"/>
  <text x="1320" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A1B0C">Service Bus / Email</text>
  <text x="1320" y="76" text-anchor="middle" font-size="7" fill="#4A1B0C">events · notify</text>

  <!-- Lifelines -->
  <line x1="80" y1="86" x2="80" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="235" y1="86" x2="235" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="86" x2="390" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="545" y1="86" x2="545" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="700" y1="86" x2="700" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="855" y1="86" x2="855" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1010" y1="86" x2="1010" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1165" y1="86" x2="1165" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1320" y1="86" x2="1320" y2="900" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Messages -->
  <!-- PHASE y=104 -->
  <rect x="24" y="91" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Step 1 — Create Claim, Upload Receipt &amp; OCR</text>

  <!-- CALL Employee->Claims Portal y=134 -->
  <line x1="80" y1="134" x2="390" y2="134" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="130" text-anchor="start" font-size="7.2" fill="#333">Fill claim form + attach receipt</text>

  <!-- CALL Claims Portal->API Gateway y=158 -->
  <line x1="390" y1="158" x2="545" y2="158" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="154" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/claims (+ JWT Bearer)</text>

  <!-- CALL API Gateway->Claims Controller y=182 -->
  <line x1="545" y1="182" x2="700" y2="182" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="178" text-anchor="start" font-size="7.2" fill="#333">route (JWT validated · [Authorize])</text>

  <!-- CALL Claims Controller->MediatR Handler y=206 -->
  <line x1="700" y1="206" x2="855" y2="206" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="202" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(CreateClaimCommand)</text>

  <!-- CALL MediatR Handler->ClaimWorkflow + OCR y=230 -->
  <line x1="855" y1="230" x2="1010" y2="230" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="226" text-anchor="start" font-size="7.2" fill="#333">create Claim (status = DRAFT)</text>

  <!-- CALL MediatR Handler->EF Core 8 y=254 -->
  <line x1="855" y1="254" x2="1165" y2="254" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="250" text-anchor="start" font-size="7.2" fill="#333">persist Claim</text>

  <!-- CALL Claims Controller->MediatR Handler y=278 -->
  <line x1="700" y1="278" x2="855" y2="278" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="274" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(UploadReceiptCommand)</text>

  <!-- CALL MediatR Handler->EF Core 8 y=302 -->
  <line x1="855" y1="302" x2="1165" y2="302" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="298" text-anchor="start" font-size="7.2" fill="#333">store receipt (Azure Blob)</text>

  <!-- SELF ClaimWorkflow + OCR y=326 -->
  <rect x="1018" y="314" width="190" height="18" rx="3" fill="#FFF8E6" stroke="#D9C36B"/>
  <text x="1024" y="327" font-size="7" fill="#6b5a18">run OCR (Tesseract) -&gt; OCRResult (confidence)</text>

  <!-- CALL MediatR Handler->EF Core 8 y=350 -->
  <line x1="855" y1="350" x2="1165" y2="350" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="346" text-anchor="start" font-size="7.2" fill="#333">save OCRResult</text>

  <!-- RETURN Claims Controller->Claims Portal y=374 -->
  <line x1="700" y1="374" x2="390" y2="374" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="694" y="370" text-anchor="end" font-size="7.2" fill="#333">201 Created (DRAFT)</text>

  <!-- PHASE y=404 -->
  <rect x="24" y="391" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="404" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Step 2 — Submit Claim</text>

  <!-- CALL Employee->Claims Portal y=434 -->
  <line x1="80" y1="434" x2="390" y2="434" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="430" text-anchor="start" font-size="7.2" fill="#333">Submit claim</text>

  <!-- CALL Claims Portal->API Gateway y=458 -->
  <line x1="390" y1="458" x2="545" y2="458" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="454" text-anchor="start" font-size="7.2" fill="#333">PUT /api/v1/claims/{id}/submit (+JWT)</text>

  <!-- CALL API Gateway->Claims Controller y=482 -->
  <line x1="545" y1="482" x2="700" y2="482" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="478" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- CALL Claims Controller->MediatR Handler y=506 -->
  <line x1="700" y1="506" x2="855" y2="506" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="502" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(SubmitClaimCommand)</text>

  <!-- CALL MediatR Handler->ClaimWorkflow + OCR y=530 -->
  <line x1="855" y1="530" x2="1010" y2="530" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="526" text-anchor="start" font-size="7.2" fill="#333">DRAFT -&gt; SUBMITTED -&gt; UNDER_REVIEW</text>

  <!-- CALL MediatR Handler->EF Core 8 y=554 -->
  <line x1="855" y1="554" x2="1165" y2="554" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="550" text-anchor="start" font-size="7.2" fill="#333">update status + ClaimStatusHistory</text>

  <!-- CALL MediatR Handler->Service Bus / Email y=578 -->
  <line x1="855" y1="578" x2="1320" y2="578" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="574" text-anchor="start" font-size="7.2" fill="#333">publish claims/submitted</text>

  <!-- SELF Service Bus / Email y=602 -->
  <rect x="1328" y="590" width="190" height="18" rx="3" fill="#FFF8E6" stroke="#D9C36B"/>
  <text x="1334" y="603" font-size="7" fill="#6b5a18">notify Manager (email)</text>

  <!-- PHASE y=632 -->
  <rect x="24" y="619" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="632" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Step 3 — Manager Review &amp; Decision</text>

  <!-- CALL Manager->Claims Portal y=662 -->
  <line x1="235" y1="662" x2="390" y2="662" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="658" text-anchor="start" font-size="7.2" fill="#333">Open queue, approve / reject</text>

  <!-- CALL Claims Portal->API Gateway y=686 -->
  <line x1="390" y1="686" x2="545" y2="686" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="682" text-anchor="start" font-size="7.2" fill="#333">PUT /api/v1/claims/{id}/approve (+JWT)</text>

  <!-- CALL API Gateway->Claims Controller y=710 -->
  <line x1="545" y1="710" x2="700" y2="710" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="706" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- CALL Claims Controller->MediatR Handler y=734 -->
  <line x1="700" y1="734" x2="855" y2="734" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="730" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(ApproveClaimCommand)</text>

  <!-- CALL MediatR Handler->ClaimWorkflow + OCR y=758 -->
  <line x1="855" y1="758" x2="1010" y2="758" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="754" text-anchor="start" font-size="7.2" fill="#333">UNDER_REVIEW -&gt; APPROVED -&gt; SETTLED</text>

  <!-- CALL MediatR Handler->EF Core 8 y=782 -->
  <line x1="855" y1="782" x2="1165" y2="782" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="778" text-anchor="start" font-size="7.2" fill="#333">update status</text>

  <!-- CALL MediatR Handler->Service Bus / Email y=806 -->
  <line x1="855" y1="806" x2="1320" y2="806" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="802" text-anchor="start" font-size="7.2" fill="#333">publish claims/approved -&gt; trigger settlement</text>

  <!-- SELF Service Bus / Email y=830 -->
  <rect x="1328" y="818" width="190" height="18" rx="3" fill="#FFF8E6" stroke="#D9C36B"/>
  <text x="1334" y="831" font-size="7" fill="#6b5a18">notify Employee (email)</text>

  <!-- PHASE y=860 -->
  <rect x="24" y="847" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="860" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Step 4 — Audit Trail</text>

  <!-- CALL MediatR Handler->Service Bus / Email y=890 -->
  <line x1="855" y1="890" x2="1320" y2="890" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="886" text-anchor="start" font-size="7.2" fill="#333">emit AuditEntry (Event Hub)</text>

</svg>
