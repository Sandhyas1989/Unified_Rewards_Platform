<svg xmlns="http://www.w3.org/2000/svg" width="1305" height="720" viewBox="0 0 1305 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <text x="652.5" y="22" text-anchor="middle" font-size="14" font-weight="700">Sequence 03 — Compensation Management</text>
  <text x="652.5" y="38" text-anchor="middle" font-size="10" fill="#5F5E5A">ASP.NET Core 8 · Compensation Rules service · Rule engine evaluation · EF Core 8 · SQLite</text>

  <!-- Header boxes -->
  <rect x="10" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="80" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">HR Admin</text>
  <text x="80" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">configures rules</text>

  <rect x="165" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="235" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Employee</text>
  <text x="235" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">views CTC</text>

  <rect x="320" y="48" width="140" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="390" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#085041">Comp Portal</text>
  <text x="390" y="76" text-anchor="middle" font-size="7" fill="#085041">React MF</text>

  <rect x="475" y="48" width="140" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="545" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#3C3489">API Gateway</text>
  <text x="545" y="76" text-anchor="middle" font-size="7" fill="#3C3489">YARP Gateway</text>

  <rect x="630" y="48" width="140" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="700" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Compensation Controller</text>
  <text x="700" y="76" text-anchor="middle" font-size="7" fill="#0C447C">ASP.NET Core 8</text>

  <rect x="785" y="48" width="140" height="38" rx="6" fill="#DCE9F8" stroke="#185FA5"/>
  <text x="855" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Service Handler</text>
  <text x="855" y="76" text-anchor="middle" font-size="7" fill="#0C447C">controller</text>

  <rect x="940" y="48" width="140" height="38" rx="6" fill="#ECE3F6" stroke="#6B4FA8"/>
  <text x="1010" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A2E7A">NRules Engine</text>
  <text x="1010" y="76" text-anchor="middle" font-size="7" fill="#4A2E7A">rule eval</text>

  <rect x="1095" y="48" width="140" height="38" rx="6" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="1165" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#412402">EF Core · SQLite</text>
  <text x="1165" y="76" text-anchor="middle" font-size="7" fill="#412402">persistence</text>

  <!-- Lifelines -->
  <line x1="80" y1="86" x2="80" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="235" y1="86" x2="235" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="86" x2="390" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="545" y1="86" x2="545" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="700" y1="86" x2="700" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="855" y1="86" x2="855" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1010" y1="86" x2="1010" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1165" y1="86" x2="1165" y2="692" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- PHASE 1 -->
  <rect x="24" y="91" width="1257" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="652.5" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 1 — HR Admin Configures Compensation Rules</text>

  <!-- CALL HR Admin(0)->Comp Portal(2) y=134 -->
  <line x1="80" y1="134" x2="390" y2="134" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="130" text-anchor="start" font-size="7.2" fill="#333">Create compensation rule</text>

  <!-- CALL Comp Portal(2)->API Gateway(3) y=158 -->
  <line x1="390" y1="158" x2="545" y2="158" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="154" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/compensation/rules (+JWT)</text>

  <!-- CALL API Gateway(3)->Controller(4) y=182 -->
  <line x1="545" y1="182" x2="700" y2="182" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="178" text-anchor="start" font-size="7.2" fill="#333">route (JWT validated)</text>

  <!-- CALL Controller(4)->Handler(5) y=206 -->
  <line x1="700" y1="206" x2="855" y2="206" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="202" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(CreateRuleCommand)</text>

  <!-- CALL Handler(5)->NRules(6) y=230 -->
  <line x1="855" y1="230" x2="1010" y2="230" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="226" text-anchor="start" font-size="7.2" fill="#333">compile &amp; validate formula (NRules DSL)</text>

  <!-- CALL Handler(5)->Data(7) y=254 -->
  <line x1="855" y1="254" x2="1165" y2="254" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="250" text-anchor="start" font-size="7.2" fill="#333">persist CompensationRule (SQLite)</text>

  <!-- CALL Handler(5)->Data(7) y=278 -->
  <line x1="855" y1="278" x2="1165" y2="278" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="274" text-anchor="start" font-size="7.2" fill="#333">persist rule update</text>

  <!-- RETURN Controller(4)->Comp Portal(2) y=302 -->
  <line x1="700" y1="302" x2="390" y2="302" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="694" y="298" text-anchor="end" font-size="7.2" fill="#333">201 Created</text>

  <!-- PHASE 2 -->
  <rect x="24" y="313" width="1257" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="652.5" y="326" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 2 — Apply Rules to Employees</text>

  <!-- CALL HR Admin(0)->Comp Portal(2) y=356 -->
  <line x1="80" y1="356" x2="390" y2="356" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="352" text-anchor="start" font-size="7.2" fill="#333">Apply rules to grade</text>

  <!-- CALL Comp Portal(2)->API Gateway(3) y=380 -->
  <line x1="390" y1="380" x2="545" y2="380" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="376" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/compensation/apply (+JWT)</text>

  <!-- CALL API Gateway(3)->Controller(4) y=404 -->
  <line x1="545" y1="404" x2="700" y2="404" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="400" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- CALL Controller(4)->Handler(5) y=428 -->
  <line x1="700" y1="428" x2="855" y2="428" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="424" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(ApplyRulesCommand)</text>

  <!-- CALL Handler(5)->NRules(6) y=452 -->
  <line x1="855" y1="452" x2="1010" y2="452" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="448" text-anchor="start" font-size="7.2" fill="#333">evaluate rules -&gt; CTC breakdown</text>

  <!-- CALL Handler(5)->Data(7) y=476 -->
  <line x1="855" y1="476" x2="1165" y2="476" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="472" text-anchor="start" font-size="7.2" fill="#333">persist CTCBreakdown</text>

  <!-- CALL Handler(5)->Data(7) y=500 -->
  <line x1="855" y1="500" x2="1165" y2="500" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="496" text-anchor="start" font-size="7.2" fill="#333">cache compiled rules (Redis TTL 60 min)</text>

  <!-- PHASE 3 -->
  <rect x="24" y="511" width="1257" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="652.5" y="524" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 3 — Employee Views CTC</text>

  <!-- CALL Employee(1)->Comp Portal(2) y=554 -->
  <line x1="235" y1="554" x2="390" y2="554" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="550" text-anchor="start" font-size="7.2" fill="#333">View CTC breakdown</text>

  <!-- CALL Comp Portal(2)->API Gateway(3) y=578 -->
  <line x1="390" y1="578" x2="545" y2="578" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="574" text-anchor="start" font-size="7.2" fill="#333">GET /api/v1/compensation/ctc (+JWT)</text>

  <!-- CALL API Gateway(3)->Controller(4) y=602 -->
  <line x1="545" y1="602" x2="700" y2="602" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="598" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- CALL Controller(4)->Handler(5) y=626 -->
  <line x1="700" y1="626" x2="855" y2="626" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="622" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(GetCTCQuery)</text>

  <!-- CALL Handler(5)->Data(7) y=650 -->
  <line x1="855" y1="650" x2="1165" y2="650" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="646" text-anchor="start" font-size="7.2" fill="#333">Redis cache HIT</text>

  <!-- RETURN Controller(4)->Comp Portal(2) y=674 -->
  <line x1="700" y1="674" x2="390" y2="674" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="694" y="670" text-anchor="end" font-size="7.2" fill="#333">CTC breakdown</text>
</svg>
