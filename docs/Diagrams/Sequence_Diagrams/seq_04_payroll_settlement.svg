<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="600" viewBox="0 0 1460 600" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <text x="730" y="22" text-anchor="middle" font-size="14" font-weight="700">Sequence 04 — Payroll Processing &amp; Claim Settlement</text>
  <text x="730" y="38" text-anchor="middle" font-size="10" fill="#5F5E5A">Async settlement (Service Bus) + sync payslip download · IPayrollService + Polly retry · External SAP/ADP/Workday · ClosedXML</text>

  <!-- Lifeline 0: Service Bus -->
  <rect x="10" y="48" width="140" height="38" rx="6" fill="#FAECE7" stroke="#993C1D"/>
  <text x="80" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A1B0C">Service Bus</text>
  <text x="80" y="76" text-anchor="middle" font-size="7" fill="#4A1B0C">claim events</text>
  <line x1="80" y1="86" x2="80" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 1: Employee -->
  <rect x="165" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="235" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Employee</text>
  <text x="235" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">payslip download</text>
  <line x1="235" y1="86" x2="235" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 2: Payroll Controller -->
  <rect x="320" y="48" width="140" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="390" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Payroll Controller</text>
  <text x="390" y="76" text-anchor="middle" font-size="7" fill="#0C447C">ASP.NET Core 8</text>
  <line x1="390" y1="86" x2="390" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 3: MediatR / Settlement -->
  <rect x="475" y="48" width="140" height="38" rx="6" fill="#DCE9F8" stroke="#185FA5"/>
  <text x="545" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">MediatR / Settlement</text>
  <text x="545" y="76" text-anchor="middle" font-size="7" fill="#0C447C">CQRS handler</text>
  <line x1="545" y1="86" x2="545" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 4: PaySlip Generator -->
  <rect x="630" y="48" width="140" height="38" rx="6" fill="#ECE3F6" stroke="#6B4FA8"/>
  <text x="700" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A2E7A">PaySlip Generator</text>
  <text x="700" y="76" text-anchor="middle" font-size="7" fill="#4A2E7A">ClosedXML</text>
  <line x1="700" y1="86" x2="700" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 5: IPayrollService -->
  <rect x="785" y="48" width="140" height="38" rx="6" fill="#ECE3F6" stroke="#6B4FA8"/>
  <text x="855" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A2E7A">IPayrollService</text>
  <text x="855" y="76" text-anchor="middle" font-size="7" fill="#4A2E7A">+ Polly retry</text>
  <line x1="855" y1="86" x2="855" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 6: External Payroll -->
  <rect x="940" y="48" width="140" height="38" rx="6" fill="#FAECE7" stroke="#993C1D"/>
  <text x="1010" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A1B0C">External Payroll</text>
  <text x="1010" y="76" text-anchor="middle" font-size="7" fill="#4A1B0C">SAP/ADP/Workday</text>
  <line x1="1010" y1="86" x2="1010" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 7: EF Core · SQL/Blob -->
  <rect x="1095" y="48" width="140" height="38" rx="6" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="1165" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#412402">EF Core · SQL/Blob</text>
  <text x="1165" y="76" text-anchor="middle" font-size="7" fill="#412402">persistence</text>
  <line x1="1165" y1="86" x2="1165" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Lifeline 8: Email / Event Hub -->
  <rect x="1250" y="48" width="140" height="38" rx="6" fill="#FAECE7" stroke="#993C1D"/>
  <text x="1320" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A1B0C">Email / Event Hub</text>
  <text x="1320" y="76" text-anchor="middle" font-size="7" fill="#4A1B0C">notify · audit</text>
  <line x1="1320" y1="86" x2="1320" y2="572" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ===== MESSAGES ===== -->

  <!-- PHASE y=104 -->
  <rect x="24" y="91" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Async — Claim-Approved Settlement (event-triggered)</text>

  <!-- CALL Service Bus -> MediatR y=134 -->
  <line x1="80" y1="134" x2="545" y2="134" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="130" text-anchor="start" font-size="7.2" fill="#333">ClaimApprovedEvent</text>

  <!-- CALL MediatR -> EF Core y=158 -->
  <line x1="545" y1="158" x2="1165" y2="158" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="154" text-anchor="start" font-size="7.2" fill="#333">fetch payroll data (Azure SQL)</text>

  <!-- CALL MediatR -> EF Core y=182 -->
  <line x1="545" y1="182" x2="1165" y2="182" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="178" text-anchor="start" font-size="7.2" fill="#333">persist Settlement record</text>

  <!-- CALL MediatR -> PaySlip Generator y=206 -->
  <line x1="545" y1="206" x2="700" y2="206" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="202" text-anchor="start" font-size="7.2" fill="#333">finalize payslip (ClosedXML)</text>

  <!-- CALL PaySlip Generator -> EF Core y=230 -->
  <line x1="700" y1="230" x2="1165" y2="230" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="226" text-anchor="start" font-size="7.2" fill="#333">store payslip PDF (Blob)</text>

  <!-- CALL MediatR -> IPayrollService y=254 -->
  <line x1="545" y1="254" x2="855" y2="254" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="250" text-anchor="start" font-size="7.2" fill="#333">push settlement</text>

  <!-- PHASE y=284 -->
  <rect x="24" y="271" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="284" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Resilience — Polly Retry (3x back-off 1s / 2s / 4s)</text>

  <!-- CALL IPayrollService -> External Payroll y=314 -->
  <line x1="855" y1="314" x2="1010" y2="314" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="310" text-anchor="start" font-size="7.2" fill="#333">POST /payroll/push</text>

  <!-- RETURN External Payroll -> IPayrollService y=338 -->
  <line x1="1010" y1="338" x2="855" y2="338" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="1004" y="334" text-anchor="end" font-size="7.2" fill="#333">200 OK</text>

  <!-- SELF IPayrollService y=362 -->
  <rect x="863" y="350" width="210" height="18" rx="3" fill="#FFF8E6" stroke="#D9C36B"/>
  <text x="869" y="363" font-size="7" fill="#6b5a18">on 500/timeout retry; after 3 fails -&gt; DLQ</text>

  <!-- CALL MediatR -> Email/Event Hub y=386 -->
  <line x1="545" y1="386" x2="1320" y2="386" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="382" text-anchor="start" font-size="7.2" fill="#333">notify employee (payslip ready)</text>

  <!-- CALL MediatR -> Email/Event Hub y=410 -->
  <line x1="545" y1="410" x2="1320" y2="410" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="406" text-anchor="start" font-size="7.2" fill="#333">emit AuditEntry (Event Hub)</text>

  <!-- PHASE y=440 -->
  <rect x="24" y="427" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="440" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Sync — Employee Downloads Payslip (on-demand)</text>

  <!-- CALL Employee -> Payroll Controller y=470 -->
  <line x1="235" y1="470" x2="390" y2="470" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="466" text-anchor="start" font-size="7.2" fill="#333">GET /api/v1/payroll/payslip (+JWT)</text>

  <!-- CALL Payroll Controller -> MediatR y=494 -->
  <line x1="390" y1="494" x2="545" y2="494" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="490" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(GetPaySlipQuery)</text>

  <!-- CALL MediatR -> EF Core y=518 -->
  <line x1="545" y1="518" x2="1165" y2="518" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="514" text-anchor="start" font-size="7.2" fill="#333">fetch payslip (Blob)</text>

  <!-- RETURN Payroll Controller -> Employee y=542 -->
  <line x1="390" y1="542" x2="235" y2="542" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="384" y="538" text-anchor="end" font-size="7.2" fill="#333">payslip (PDF)</text>

</svg>
