  <!-- Messages -->
  <!-- PHASE: Continuous — Audit Trail Ingestion  (y=104) -->
  <rect x="24" y="91" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Continuous — Audit Trail Ingestion</text>

  <!-- CALL Event Hub(8)->MediatR Handler(4)  y=134 -->
  <line x1="1320" y1="134" x2="700" y2="134" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1314" y="130" text-anchor="end" font-size="7.2" fill="#333">stream AuditEvents</text>

  <!-- CALL MediatR Handler(4)->EF Core(7)  y=158 -->
  <line x1="700" y1="158" x2="1165" y2="158" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="154" text-anchor="start" font-size="7.2" fill="#333">persist AuditEntry (append-only, 7-yr)</text>

  <!-- PHASE: Report Generation  y=188 -->
  <rect x="24" y="175" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="188" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Report Generation</text>

  <!-- CALL Finance User(0)->Reports Portal(1)  y=218 -->
  <line x1="80" y1="218" x2="235" y2="218" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="214" text-anchor="start" font-size="7.2" fill="#333">Request report (claims / comp / audit)</text>

  <!-- CALL Reports Portal(1)->API Gateway(2)  y=242 -->
  <line x1="235" y1="242" x2="390" y2="242" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="238" text-anchor="start" font-size="7.2" fill="#333">GET /api/v1/reports/{type} (+JWT)</text>

  <!-- CALL API Gateway(2)->Reporting Controller(3)  y=266 -->
  <line x1="390" y1="266" x2="545" y2="266" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="262" text-anchor="start" font-size="7.2" fill="#333">route (JWT validated · Finance role)</text>

  <!-- CALL Reporting Controller(3)->MediatR Handler(4)  y=290 -->
  <line x1="545" y1="290" x2="700" y2="290" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="286" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(GenerateReportQuery)</text>

  <!-- CALL MediatR Handler(4)->Source Services(5)  y=314 -->
  <line x1="700" y1="314" x2="855" y2="314" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="310" text-anchor="start" font-size="7.2" fill="#333">aggregate data (LINQ group/aggregate)</text>

  <!-- CALL Source Services(5)->EF Core(7)  y=338 -->
  <line x1="855" y1="338" x2="1165" y2="338" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="334" text-anchor="start" font-size="7.2" fill="#333">read Claims / Payroll / Compensation</text>

  <!-- CALL MediatR Handler(4)->ClosedXML Export(6)  y=362 -->
  <line x1="700" y1="362" x2="1010" y2="362" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="358" text-anchor="start" font-size="7.2" fill="#333">build workbook (xlsx) or PDF</text>

  <!-- RETURN Reporting Controller(3)->Reports Portal(1)  y=386 -->
  <line x1="545" y1="386" x2="235" y2="386" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="539" y="382" text-anchor="end" font-size="7.2" fill="#333">file stream (xlsx / pdf)</text>

  <!-- PHASE: Immutability  y=416 -->
  <rect x="24" y="403" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="416" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Immutability</text>

  <!-- NOTE  y=446 -->
  <rect x="530" y="434" width="400" height="18" rx="3" fill="#FFF8E6" stroke="#D9C36B"/>
  <text x="730" y="447" text-anchor="middle" font-size="7" fill="#6b5a18">Reports are immutable read-only views; every access is itself audited</text>
