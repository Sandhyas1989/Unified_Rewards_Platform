<svg xmlns="http://www.w3.org/2000/svg" width="1615" height="672" viewBox="0 0 1615 672" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <text x="807.5" y="22" text-anchor="middle" font-size="14" font-weight="700">Sequence 05 — Promotion Management</text>
  <text x="807.5" y="38" text-anchor="middle" font-size="10" fill="#5F5E5A">ASP.NET Core 8 · MediatR CQRS · Promotions module · Eligibility check · Cosmos DB · triggers CTC update</text>

  <!-- Lifeline lines -->
  <line x1="80" y1="86" x2="80" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="235" y1="86" x2="235" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="86" x2="390" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="545" y1="86" x2="545" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="700" y1="86" x2="700" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="855" y1="86" x2="855" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1010" y1="86" x2="1010" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1165" y1="86" x2="1165" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1320" y1="86" x2="1320" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1475" y1="86" x2="1475" y2="644" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Header boxes -->
  <rect x="10" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="80" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">HR Admin</text>
  <text x="80" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">cycle mgmt</text>

  <rect x="165" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="235" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Manager</text>
  <text x="235" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">nominates</text>

  <rect x="320" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="390" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Employee</text>
  <text x="390" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">views status</text>

  <rect x="475" y="48" width="140" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="545" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#085041">Promo Portal</text>
  <text x="545" y="76" text-anchor="middle" font-size="7" fill="#085041">React MF</text>

  <rect x="630" y="48" width="140" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="700" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#3C3489">API Gateway</text>
  <text x="700" y="76" text-anchor="middle" font-size="7" fill="#3C3489">Azure APIM</text>

  <rect x="785" y="48" width="140" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="855" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Promotions Controller</text>
  <text x="855" y="76" text-anchor="middle" font-size="7" fill="#0C447C">ASP.NET Core 8</text>

  <rect x="940" y="48" width="140" height="38" rx="6" fill="#DCE9F8" stroke="#185FA5"/>
  <text x="1010" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">MediatR Handler</text>
  <text x="1010" y="76" text-anchor="middle" font-size="7" fill="#0C447C">CQRS</text>

  <rect x="1095" y="48" width="140" height="38" rx="6" fill="#ECE3F6" stroke="#6B4FA8"/>
  <text x="1165" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A2E7A">Eligibility Checker</text>
  <text x="1165" y="76" text-anchor="middle" font-size="7" fill="#4A2E7A">grade·tenure·rating</text>

  <rect x="1250" y="48" width="140" height="38" rx="6" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="1320" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#412402">EF Core · Cosmos</text>
  <text x="1320" y="76" text-anchor="middle" font-size="7" fill="#412402">persistence</text>

  <rect x="1405" y="48" width="140" height="38" rx="6" fill="#FAECE7" stroke="#993C1D"/>
  <text x="1475" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A1B0C">Compensation / Email</text>
  <text x="1475" y="76" text-anchor="middle" font-size="7" fill="#4A1B0C">CTC · notify</text>

  <!-- Messages -->
  <!-- y=104 PHASE 1 -->
  <rect x="24" y="91" width="1567" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="807.5" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 1 — HR Admin Creates Promotion Cycle</text>

  <!-- y=134 CALL HR Admin->Promo Portal -->
  <line x1="80" y1="134" x2="545" y2="134" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="130" text-anchor="start" font-size="7.2" fill="#333">Create promotion cycle</text>

  <!-- y=158 CALL Promo Portal->API Gateway -->
  <line x1="545" y1="158" x2="700" y2="158" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="154" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/promotions/cycles (+JWT)</text>

  <!-- y=182 CALL API Gateway->Promotions Controller -->
  <line x1="700" y1="182" x2="855" y2="182" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="178" text-anchor="start" font-size="7.2" fill="#333">route (JWT validated)</text>

  <!-- y=206 CALL Promotions Controller->MediatR Handler -->
  <line x1="855" y1="206" x2="1010" y2="206" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="202" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(CreateCycleCommand)</text>

  <!-- y=230 CALL MediatR Handler->EF Core Cosmos -->
  <line x1="1010" y1="230" x2="1320" y2="230" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1016" y="226" text-anchor="start" font-size="7.2" fill="#333">persist PromotionCycle</text>

  <!-- y=254 PHASE 2 -->
  <rect x="24" y="241" width="1567" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="807.5" y="254" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 2 — Manager Nominates</text>

  <!-- y=284 CALL Manager->Promo Portal -->
  <line x1="235" y1="284" x2="545" y2="284" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="280" text-anchor="start" font-size="7.2" fill="#333">Nominate employee</text>

  <!-- y=308 CALL Promo Portal->API Gateway -->
  <line x1="545" y1="308" x2="700" y2="308" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="304" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/promotions/nominations (+JWT)</text>

  <!-- y=332 CALL API Gateway->Promotions Controller -->
  <line x1="700" y1="332" x2="855" y2="332" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="328" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- y=356 CALL Promotions Controller->MediatR Handler -->
  <line x1="855" y1="356" x2="1010" y2="356" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="352" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(NominateCommand)</text>

  <!-- y=380 CALL MediatR Handler->Eligibility Checker -->
  <line x1="1010" y1="380" x2="1165" y2="380" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1016" y="376" text-anchor="start" font-size="7.2" fill="#333">check grade / tenure / rating</text>

  <!-- y=404 CALL MediatR Handler->EF Core Cosmos -->
  <line x1="1010" y1="404" x2="1320" y2="404" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1016" y="400" text-anchor="start" font-size="7.2" fill="#333">persist PromotionNomination</text>

  <!-- y=428 PHASE 3 -->
  <rect x="24" y="415" width="1567" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="807.5" y="428" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 3 — Review, Approve &amp; Close</text>

  <!-- y=458 CALL HR Admin->Promo Portal -->
  <line x1="80" y1="458" x2="545" y2="458" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="454" text-anchor="start" font-size="7.2" fill="#333">Approve / reject + close cycle</text>

  <!-- y=482 CALL Promo Portal->API Gateway -->
  <line x1="545" y1="482" x2="700" y2="482" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="478" text-anchor="start" font-size="7.2" fill="#333">PUT /api/v1/promotions/{id}/approve (+JWT)</text>

  <!-- y=506 CALL API Gateway->Promotions Controller -->
  <line x1="700" y1="506" x2="855" y2="506" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="502" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- y=530 CALL Promotions Controller->MediatR Handler -->
  <line x1="855" y1="530" x2="1010" y2="530" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="526" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(ApproveCommand)</text>

  <!-- y=554 CALL MediatR Handler->EF Core Cosmos -->
  <line x1="1010" y1="554" x2="1320" y2="554" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1016" y="550" text-anchor="start" font-size="7.2" fill="#333">update outcome + close cycle</text>

  <!-- y=578 CALL MediatR Handler->Compensation/Email -->
  <line x1="1010" y1="578" x2="1475" y2="578" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1016" y="574" text-anchor="start" font-size="7.2" fill="#333">trigger CTC update on approval</text>

  <!-- y=602 CALL MediatR Handler->Compensation/Email -->
  <line x1="1010" y1="602" x2="1475" y2="602" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="1016" y="598" text-anchor="start" font-size="7.2" fill="#333">notify employee (result)</text>

  <!-- y=626 CALL Employee->Promo Portal -->
  <line x1="390" y1="626" x2="545" y2="626" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="622" text-anchor="start" font-size="7.2" fill="#333">View promotion status</text>
</svg>
