<svg width="1460" height="696" viewBox="0 0 1460 696" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <text x="730" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a18">Sequence 02 — Benefit Plan Configuration &amp; Enrollment</text>
  <text x="730" y="38" text-anchor="middle" font-size="10" fill="#5F5E5A">ASP.NET Core 8 · MediatR CQRS · Benefits module · Cosmos DB + Redis cache (TTL 30 min) · EF Core 8</text>

  <!-- Header boxes -->
  <rect x="10" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="80" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">HR Admin</text>
  <text x="80" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">configures plans</text>

  <rect x="165" y="48" width="140" height="38" rx="6" fill="#F1EFE8" stroke="#888780"/>
  <text x="235" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#2C2C2A">Employee</text>
  <text x="235" y="76" text-anchor="middle" font-size="7" fill="#2C2C2A">self-service</text>

  <rect x="320" y="48" width="140" height="38" rx="6" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="390" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#085041">Benefits Portal</text>
  <text x="390" y="76" text-anchor="middle" font-size="7" fill="#085041">React MF</text>

  <rect x="475" y="48" width="140" height="38" rx="6" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="545" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#3C3489">API Gateway</text>
  <text x="545" y="76" text-anchor="middle" font-size="7" fill="#3C3489">Azure APIM</text>

  <rect x="630" y="48" width="140" height="38" rx="6" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="700" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">Benefits Controller</text>
  <text x="700" y="76" text-anchor="middle" font-size="7" fill="#0C447C">ASP.NET Core 8</text>

  <rect x="785" y="48" width="140" height="38" rx="6" fill="#DCE9F8" stroke="#185FA5"/>
  <text x="855" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#0C447C">MediatR Handler</text>
  <text x="855" y="76" text-anchor="middle" font-size="7" fill="#0C447C">CQRS</text>

  <rect x="940" y="48" width="140" height="38" rx="6" fill="#ECE3F6" stroke="#6B4FA8"/>
  <text x="1010" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A2E7A">Eligibility Evaluator</text>
  <text x="1010" y="76" text-anchor="middle" font-size="7" fill="#4A2E7A">criteria</text>

  <rect x="1095" y="48" width="140" height="38" rx="6" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="1165" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#412402">EF Core · Cosmos/Redis</text>
  <text x="1165" y="76" text-anchor="middle" font-size="7" fill="#412402">persistence</text>

  <rect x="1250" y="48" width="140" height="38" rx="6" fill="#FAECE7" stroke="#993C1D"/>
  <text x="1320" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#4A1B0C">Email Service</text>
  <text x="1320" y="76" text-anchor="middle" font-size="7" fill="#4A1B0C">Azure Comm Svc</text>

  <!-- Lifelines -->
  <line x1="80" y1="86" x2="80" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="235" y1="86" x2="235" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="390" y1="86" x2="390" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="545" y1="86" x2="545" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="700" y1="86" x2="700" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="855" y1="86" x2="855" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1010" y1="86" x2="1010" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1165" y1="86" x2="1165" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="1320" y1="86" x2="1320" y2="668" stroke="#C8C8C8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- PHASE 1 (y=104) -->
  <rect x="24" y="91" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="104" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 1 — HR Admin Configures Benefit Plan</text>

  <!-- CALL HR Admin->Benefits Portal (y=134) -->
  <line x1="80" y1="134" x2="390" y2="134" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="86" y="130" text-anchor="start" font-size="7.2" fill="#333">Configure benefit plan</text>

  <!-- CALL Benefits Portal->API Gateway (y=158) -->
  <line x1="390" y1="158" x2="545" y2="158" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="154" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/benefits (+JWT)</text>

  <!-- CALL API Gateway->Benefits Controller (y=182) -->
  <line x1="545" y1="182" x2="700" y2="182" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="178" text-anchor="start" font-size="7.2" fill="#333">route (JWT validated)</text>

  <!-- CALL Benefits Controller->MediatR Handler (y=206) -->
  <line x1="700" y1="206" x2="855" y2="206" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="202" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(CreatePlanCommand)</text>

  <!-- CALL MediatR Handler->EF Core (y=230) -->
  <line x1="855" y1="230" x2="1165" y2="230" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="226" text-anchor="start" font-size="7.2" fill="#333">persist BenefitPlan (Cosmos DB)</text>

  <!-- RETURN Benefits Controller->Benefits Portal (y=254) -->
  <line x1="700" y1="254" x2="390" y2="254" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="694" y="250" text-anchor="end" font-size="7.2" fill="#333">201 Created</text>

  <!-- PHASE 2 (y=284) -->
  <rect x="24" y="271" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="284" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 2 — Employee Views Eligible Plans</text>

  <!-- CALL Employee->Benefits Portal (y=314) -->
  <line x1="235" y1="314" x2="390" y2="314" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="310" text-anchor="start" font-size="7.2" fill="#333">View eligible plans</text>

  <!-- CALL Benefits Portal->API Gateway (y=338) -->
  <line x1="390" y1="338" x2="545" y2="338" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="334" text-anchor="start" font-size="7.2" fill="#333">GET /api/v1/benefits/eligible (+JWT)</text>

  <!-- CALL API Gateway->Benefits Controller (y=362) -->
  <line x1="545" y1="362" x2="700" y2="362" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="358" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- CALL Benefits Controller->MediatR Handler (y=386) -->
  <line x1="700" y1="386" x2="855" y2="386" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="382" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(GetEligiblePlansQuery)</text>

  <!-- CALL MediatR Handler->EF Core (y=410) -->
  <line x1="855" y1="410" x2="1165" y2="410" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="406" text-anchor="start" font-size="7.2" fill="#333">check Redis cache (TTL 30 min)</text>

  <!-- SELF EF Core (y=434) -->
  <rect x="1173" y="422" width="190" height="18" rx="3" fill="#FFF8E6" stroke="#D9C36B"/>
  <text x="1179" y="435" font-size="7" fill="#6b5a18">cache MISS -&gt; read Cosmos DB</text>

  <!-- CALL MediatR Handler->Eligibility Evaluator (y=458) -->
  <line x1="855" y1="458" x2="1010" y2="458" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="454" text-anchor="start" font-size="7.2" fill="#333">evaluate EligibilityCriteria</text>

  <!-- CALL MediatR Handler->EF Core (y=482) -->
  <line x1="855" y1="482" x2="1165" y2="482" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="478" text-anchor="start" font-size="7.2" fill="#333">populate Redis cache</text>

  <!-- RETURN Benefits Controller->Benefits Portal (y=506) -->
  <line x1="700" y1="506" x2="390" y2="506" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="694" y="502" text-anchor="end" font-size="7.2" fill="#333">eligible plans</text>

  <!-- PHASE 3 (y=536) -->
  <rect x="24" y="523" width="1412" height="18" rx="4" fill="#EDEBE4" stroke="#B9B6AC"/>
  <text x="730" y="536" text-anchor="middle" font-size="8.5" font-weight="700" fill="#4A4A46">Phase 3 — Enrollment</text>

  <!-- CALL Employee->Benefits Portal (y=560) -->
  <line x1="235" y1="560" x2="390" y2="560" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="241" y="556" text-anchor="start" font-size="7.2" fill="#333">Enroll in plan</text>

  <!-- CALL Benefits Portal->API Gateway (y=584) -->
  <line x1="390" y1="584" x2="545" y2="584" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="396" y="580" text-anchor="start" font-size="7.2" fill="#333">POST /api/v1/benefits/enroll (+JWT)</text>

  <!-- CALL API Gateway->Benefits Controller (y=608) -->
  <line x1="545" y1="608" x2="700" y2="608" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="551" y="604" text-anchor="start" font-size="7.2" fill="#333">route</text>

  <!-- CALL Benefits Controller->MediatR Handler (y=620) -->
  <line x1="700" y1="620" x2="855" y2="620" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="706" y="616" text-anchor="start" font-size="7.2" fill="#333">ISender.Send(EnrollCommand)</text>

  <!-- CALL MediatR Handler->EF Core (y=638) -->
  <line x1="855" y1="638" x2="1165" y2="638" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="634" text-anchor="start" font-size="7.2" fill="#333">persist BenefitEnrollment</text>

  <!-- CALL MediatR Handler->Email Service (y=652) -->
  <line x1="855" y1="652" x2="1320" y2="652" stroke="#555" stroke-width="1.1" marker-end="url(#arr)"/>
  <text x="861" y="648" text-anchor="start" font-size="7.2" fill="#333">enrollment confirmation</text>

  <!-- RETURN Benefits Controller->Benefits Portal (y=664) -->
  <line x1="700" y1="664" x2="390" y2="664" stroke="#555" stroke-width="1.1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="694" y="660" text-anchor="end" font-size="7.2" fill="#333">200 OK (enrolled)</text>
</svg>
