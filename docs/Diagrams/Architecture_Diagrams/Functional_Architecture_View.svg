  <text x="32" y="72" font-size="9" font-weight="700" fill="#2C2C2A">PUBLIC INTERNET</text>
  <!-- 4 equal tiles: inner 32..700 = 668 wide; gap 8; tile = (668-24)/4 = 161 -->
  <rect x="32" y="80" width="161" height="36" rx="5" fill="#FBFAF6" stroke="#888780" stroke-width="1"/>
  <text x="112.5" y="102" text-anchor="middle" font-size="8" fill="#2C2C2A">Employee Browser</text>
  <rect x="201" y="80" width="161" height="36" rx="5" fill="#FBFAF6" stroke="#888780" stroke-width="1"/>
  <text x="281.5" y="102" text-anchor="middle" font-size="8" fill="#2C2C2A">Manager Browser</text>
