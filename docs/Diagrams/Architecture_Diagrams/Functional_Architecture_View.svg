  <text x="366" y="375" text-anchor="middle" font-size="8" fill="#3C3489">Azure API Management (APIM) — JWT signature validation &#183; Rate limiting &#183; API versioning &#183; CORS</text>

  <!-- arrow 4 -->
  <line x1="365" y1="394" x2="365" y2="410" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="375" y="406" font-size="7.5" fill="#5F5E5A">HTTPS :443  &#183;  Auth: JWT forwarded  &#183;  Private Link</text>

