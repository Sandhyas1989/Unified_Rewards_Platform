  <text x="450.5" y="627" text-anchor="middle" font-size="7" fill="#412402">Blob &#183; Key Vault</text>
  <rect x="539" y="596" width="161" height="46" rx="5" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="619.5" y="616" text-anchor="middle" font-size="8" fill="#412402">Messaging + Audit</text>
  <text x="619.5" y="627" text-anchor="middle" font-size="7" fill="#412402">Service Bus &#183; Event Hub</text>

