  <text x="375" y="138" font-size="7.5" fill="#5F5E5A">HTTPS :443  &#183;  Auth: None  &#183;  Public</text>

  <!-- 2) AZURE EDGE LAYER -->
  <rect x="20" y="146" width="690" height="62" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
