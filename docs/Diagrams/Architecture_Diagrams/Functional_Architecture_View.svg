  <text x="863" y="366" text-anchor="middle" font-size="7" fill="#993C1D">SSO &#183; MFA &#183; JWT issuer</text>
  <line x1="726" y1="363" x2="700" y2="363" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

