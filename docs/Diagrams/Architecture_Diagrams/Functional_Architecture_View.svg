  <!-- Footnote -->
  <text x="510" y="772" text-anchor="middle" font-size="7.5" fill="#5F5E5A">Aligned to the canonical 7-module taxonomy: User Management &#183; Benefits &#183; Compensation &#183; Claims &amp; Documents &#183; Payroll &#183; Promotions &#183; Reporting &amp; Audit.</text>
