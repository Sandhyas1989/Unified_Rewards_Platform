  <rect x="180" y="728" width="16" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="202" y="738" font-size="8" fill="#2C2C2A">Data Subnet / Private</text>
  <rect x="360" y="728" width="16" height="12" rx="2" fill="#FEF6F2" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2"/>
