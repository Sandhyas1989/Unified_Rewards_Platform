  <text x="501.2" y="282" text-anchor="middle" font-size="8" fill="#085041">HR Admin Remote</text>
  <rect x="572.8" y="256" width="127.2" height="46" rx="5" fill="#C9EEE1" stroke="#0F6E56" stroke-width="1"/>
  <text x="636.4" y="282" text-anchor="middle" font-size="8" fill="#085041">Finance Remote</text>

