  <rect x="32" y="596" width="161" height="46" rx="5" fill="#FAC775" stroke="#BA7517" stroke-width="1"/>
  <text x="112.5" y="616" text-anchor="middle" font-size="8" fill="#412402">Relational DB</text>
  <text x="112.5" y="627" text-anchor="middle" font-size="7" fill="#412402">Azure SQL</text>
