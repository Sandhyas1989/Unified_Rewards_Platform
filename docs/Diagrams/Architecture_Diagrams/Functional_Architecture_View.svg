  <text x="863" y="508" text-anchor="middle" font-size="7" fill="#993C1D">Email Notifications</text>
  <line x1="726" y1="498" x2="700" y2="498" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- Azure Functions -> Application Subnet -->
  <rect x="726" y="534" width="274" height="44" rx="8" fill="#FEF6F2" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="863" y="552" text-anchor="middle" font-size="8" font-weight="700" fill="#993C1D">Azure Functions</text>
  <text x="863" y="566" text-anchor="middle" font-size="7" fill="#993C1D">OCR &#183; Reports &#183; Payroll Batch</text>
